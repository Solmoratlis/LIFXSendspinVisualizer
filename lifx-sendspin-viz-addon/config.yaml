name: LIFX SendSpin Music Visualizer
version: "0.1.0"
slug: lifx_sendspin_viz
description: Synchronized music visualization for LIFX lights using Music Assistant + SendSpin protocol (visualizer role)
url: https://github.com/Solmoralis/LIFXSendspinVisualizer
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:lightbulb-multiple
panel_title: LIFX Music Viz
options:
  sendspin_url: "ws://homeassistant.local:8927/sendspin"
  client_name: "LIFX Visualizer Add-on"
  lifx_discover_all: true
  lifx_light_labels: []
  lifx_mac_addresses: []
  effect: "energy_pulse"
  sensitivity: 1.0
  update_rate_hz: 12
  brightness_min: 5
  brightness_max: 100
  flash_on_beat: true
  flash_duration_ms: 80
  spectrum_bins: 8
  spectrum_scale: "mel"
  f_min: 20
  f_max: 20000
  decay: 0.75
  hue_shift: 0
  enabled: true
schema:
  sendspin_url: str
  client_name: str
  lifx_discover_all: bool
  lifx_light_labels:
    type: list
    items:
      type: str
  lifx_mac_addresses:
    type: list
    items:
      type: str
  effect:
    type: list
    options:
      - energy_pulse
      - spectrum_bands
      - dominant_hue
      - beat_strobe
      - rainbow_energy
      - bass_punch
      - frequency_sweep
      - calm_ambient
      - party_strobe
      - custom
  sensitivity: float(0.1, 5.0)
  update_rate_hz: int(5, 30)
  brightness_min: int(0, 100)
  brightness_max: int(0, 100)
  flash_on_beat: bool
  flash_duration_ms: int(20, 500)
  spectrum_bins: int(4, 32)
  spectrum_scale:
    type: list
    options:
      - mel
      - log
      - lin
  f_min: int(10, 1000)
  f_max: int(1000, 22000)
  decay: float(0.1, 0.99)
  hue_shift: int(0, 360)
  enabled: bool
map:
  - type: data
    read_only: false
    path: /data
ports:
  8099/tcp: 8099
environment:
  LOG_LEVEL: INFO
  PYTHONUNBUFFERED: "1"
# For local LIFX UDP discovery
host_network: false   # Set to true if discovery issues (but prefer false for security)
# Uncomment if you need host network for mDNS or UDP broadcast reliability
# host_network: true
